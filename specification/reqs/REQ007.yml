text: |
  キャッシュの有効期限を関数名パターンに基づくルールで設定できること。個別の関数に対して保持期間を指定でき、期限切れのキャッシュを自動的に無効化できること。

  ## 背景・動機

  キャッシュデータは時間経過とともに価値が低下したり、ストレージ容量を圧迫したりするため。手動による削除運用を不要にし、自動的かつ柔軟に古いデータを無効化・削除する仕組みを提供することで、メンテナンスコストを削減する。
