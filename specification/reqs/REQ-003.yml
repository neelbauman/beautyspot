text: |
  ## 概要
  キャッシュシステムのパフォーマンスとスループットを制御する。

  ## 背景・動機
  外部API呼び出しや重い計算をキャッシュする際、同時実行数やレート制限が必要になる。
  また、キャッシュの保存処理自体がメインの計算パイプラインのボトルネックに
  ならないよう、バックグラウンドでの非同期保存が求められる。

  ## 受け入れ基準
  - レートリミッター（トークンバケット）により関数実行頻度を制限できる
  - キャッシュ保存処理をバックグラウンドスレッドで非同期実行できる（wait=False）
  - 同一関数・同一引数への同時リクエストを束ねる（Thundering Herd対策）
