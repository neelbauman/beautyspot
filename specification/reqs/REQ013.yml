text: |
  同一キャッシュキーに対する並行リクエストを直列化し、1つのリクエストのみが関数を実行し、他のリクエストはその結果を共有することで重複実行を防止できること。

  ## 背景・動機

  同一の重い計算処理やAPI呼び出しに対して、複数スレッド/プロセスから同時にリクエストが殺到した際、キャッシュミスとなって無駄な再実行が多重に発生する（Thundering Herd問題）のを防ぎ、システムリソースを保護するため。
