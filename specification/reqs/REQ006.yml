text: |
  キャッシュの保存処理をバックグラウンドで非同期に実行し、関数の応答レイテンシに影響を与えないモードを提供すること。

  ## 背景・動機

  キャッシュの保存処理（DBへのインサートやファイル書き込み）がメインスレッドをブロックすると、関数の応答速度（レイテンシ）が悪化し、ユーザー体験を損なうため。キャッシュ保存の非同期化により、キャッシュ適用によるパフォーマンスのペナルティを実質ゼロにする。
