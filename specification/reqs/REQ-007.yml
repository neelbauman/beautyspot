text: |
  ## 概要
  エラー発生時の耐性とリソースの安全な解放を保証する。

  ## 背景・動機
  バックグラウンド保存の失敗、シリアライズエラー、ストレージ障害など、
  さまざまなエラーが発生しうる。これらがメインの処理フローを
  阻害せず、かつリソースリークを起こさないことが重要である。

  ## 受け入れ基準
  - バックグラウンド保存の失敗はERRORレベルでログ出力され、例外をraiseしない
  - コンテキストマネージャ（with spot:）でペンディングタスクの完了を待機できる
  - プロセス終了時にatexitでリソースが安全に解放される
  - 構造化された例外階層（BeautySpotError配下）でエラーを分類できる
