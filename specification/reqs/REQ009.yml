text: |
  関数の実行前、キャッシュヒット時、キャッシュミス時にカスタムコールバック（フック）を実行できること。スレッドセーフなフック実装を提供すること。

  ## 背景・動機

  ユーザーが関数のビジネスロジックを汚すことなく、キャッシュヒット率の計測、LLMのトークン消費量のトラッキング、あるいはカスタムログの出力などの横断的関心事（Cross-cutting concerns）を柔軟に差し込めるようにするため。
