text: |
  関数の実行結果をキャッシュし、同一入力に対して再実行せずにキャッシュから結果を返せること。同期関数・非同期関数の両方をサポートすること。

  ## 背景・動機

  データパイプラインや機械学習の実験、LLMのAPI呼び出しにおいて、同一入力に対する高コストな再実行を回避し、システムの応答速度向上とAPI課金の節約を同時に実現するため。
