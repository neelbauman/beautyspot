text: |
  期限切れキャッシュの削除、孤立Blobファイルのガベージコレクション、時間ベースの一括削除（prune）等のメンテナンス操作ができること。

  ## 背景・動機

  運用が長期化するにつれて、無効になったキャッシュデータや孤立したファイルがストレージを逼迫するため。運用者がストレージを健全に保つための管理機能（定期クリーンアップ等）を提供し、システムダウンを防ぐ。
