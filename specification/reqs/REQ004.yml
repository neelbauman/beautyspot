text: |
  大きなキャッシュデータを外部ストレージ（ローカルファイルシステムやS3等）に保存できること。

  DB直接保存とBlob保存を自動判定できること。

  ## 背景・動機

  LLMの生成テキストや機械学習モデルの推論結果など、数MB〜数GBに及ぶ結果データをデータベース（SQLite等）に直接保存すると、DBの肥大化とパフォーマンス劣化を招くため、メタデータと実データを分離して管理するアーキテクチャが必要不可欠なため。
