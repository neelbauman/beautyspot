  本プロジェクト（Beautyspot）で使用される主要な用語の定義です。

  ## 背景・動機

  プロジェクトに関わる全メンバー（開発者、利用者）が同一の「ユビキタス言語」を用いることで、ドキュメント、コード、およびコミュニケーションにおける認識の齟齬を防ぐため。
