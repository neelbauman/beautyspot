text: |
  ## 概要
  大容量の実行結果データを効率的に永続化する。

  ## 背景・動機
  ML実験やデータ分析では、数MB〜数GBに達する実行結果（モデル、DataFrame等）を扱う。
  これらをメタデータDBに直接格納すると性能劣化を招くため、
  Blobストレージへの分離保存が必要である。

  ## 受け入れ基準
  - データサイズに応じてDB保存とBlobストレージ保存を自動的に切り替えられる
  - ストレージポリシーをユーザーが設定可能である
  - ローカルファイルシステムおよびS3互換ストレージをサポートする
  - ストレージバックエンドはプロトコルに従えばカスタム実装に差し替え可能である
