text: |
  ## 概要
  キャッシュの状態確認・管理のためのCLIツールを提供する。

  ## 背景・動機
  キャッシュの肥大化、不要データの蓄積、障害時の状態確認など、
  運用上の管理作業をコマンドラインから効率的に行えることが求められる。

  ## 受け入れ基準
  - キャッシュ済みタスクの一覧表示・詳細表示ができる
  - キャッシュの統計情報（件数、サイズ等）を表示できる
  - 指定条件でのキャッシュ削除（clear）ができる
  - 孤立Blobファイルのクリーンアップ（clean/gc）ができる
  - 時間ベースのキャッシュ失効処理（prune）ができる
  - インタラクティブダッシュボード（ui）を起動できる
