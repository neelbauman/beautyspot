text: |
  関数の実行頻度をトークンバケット方式で制限し、外部APIの呼び出しレートを制御できること。同期・非同期の両方に対応すること。

  ## 背景・動機

  外部API（特にLLMのAPIなど）は、利用制限（Rate Limit）が厳しく設定されていることが多く、短時間での過剰なリクエストによるエラー（HTTP 429等）を防ぐため。キャッシュだけでなくAPI呼び出し自体の安定性を高める。
