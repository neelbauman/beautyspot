text: |
  関数の引数から安定かつ一意なキャッシュキーを生成できること。引数の型・構造に応じた正規化を行い、辞書のキー順序やコレクション型の違いを正しく区別できること。

  ## 背景・動機

  Pythonの多様なオブジェクト（辞書、リスト、カスタムクラス等）を入力とする関数において、意味的に同一の入力を正確に識別し、キャッシュのヒット率を最大化するとともに、意図しないキャッシュミスや誤ヒットを防ぐため。
