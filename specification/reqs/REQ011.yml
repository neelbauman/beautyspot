text: |
  コマンドラインインターフェースからキャッシュの一覧表示、詳細確認、統計表示、削除、GC等の管理操作ができること。

  ## 背景・動機

  開発時や運用時に、現在のキャッシュの状況確認や不要なキャッシュの手動削除を、Pythonコードを書かずにコマンドラインから直感的に素早く実行できるようにするため。
