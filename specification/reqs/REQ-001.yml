text: |
  ## 概要
  関数の実行結果を透過的にキャッシュし、同一引数での再実行を高速化する。

  ## 背景・動機
  データパイプラインやML実験では、同じ関数を同じ引数で繰り返し実行することが頻繁にある。
  計算コストの高い関数の結果をキャッシュすることで、開発サイクルを大幅に短縮できる。
  ユーザーは既存コードを最小限の変更（デコレータの付与のみ）でキャッシュ可能にしたい。

  ## 受け入れ基準
  - デコレータ（@mark）を付与するだけで、関数の戻り値が自動的にキャッシュされる
  - 同一引数での2回目以降の呼び出しでは、関数を再実行せずキャッシュから結果を返す
  - 引数が異なる場合は関数を再実行し、新しい結果をキャッシュする
  - キャッシュキーは引数の内容に基づき決定論的に生成される
  - 同期関数・非同期関数の両方をサポートする
