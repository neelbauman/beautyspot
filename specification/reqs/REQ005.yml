text: |
  関数の戻り値を安全にシリアライズ・デシリアライズできること。ユーザー定義型のカスタムエンコーダ・デコーダを登録可能であること。

  ## 背景・動機

  Pythonのオブジェクト（辞書やカスタムクラス等）を、バイト列としてDBやストレージに安全かつ効率的に永続化・復元するため。また、任意のオブジェクト（例: Pandas DataFrameやPydanticモデル）にも対応できる拡張性を提供するため。
