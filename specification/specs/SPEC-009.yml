text: |
  ## 概要
  タスク実行ライフサイクルへのフック機構（HookBase）。

  ## 詳細仕様

  ### 入力
  - HookBase サブクラスのインスタンス
  - コンテキストオブジェクト（PreExecuteContext, CacheHitContext, CacheMissContext）

  ### 処理
  - pre_execute(ctx): 関数実行前またはキャッシュ確認前に呼び出し
  - on_cache_hit(ctx): キャッシュヒット時に呼び出し
  - on_cache_miss(ctx): キャッシュミス・関数実行後に呼び出し
  - ThreadSafeHookBase: RLockで保護されたスレッドセーフ版

  ### 出力・結果
  - ユーザー定義の処理がライフサイクルの適切なタイミングで実行される
  - フックは @spot.mark(hooks=[...]) または cached_run(hooks=[...]) で関数ごとに指定する
