text: |
  ## 概要
  SHA-256ベースの決定論的キャッシュキー生成（KeyGen）。

  ## 詳細仕様

  ### 入力
  - 関数名、バージョン文字列、引数（*args, **kwargs）

  ### 処理
  - 引数を正規化（dict はキーソート、set はソート、dataclass は __dict__ 変換）
  - 型タグを付与してハッシュ衝突を回避
  - KeyGenPolicy でパラメータごとの戦略（ignore, custom 等）を適用
  - SHA-256でハッシュ値を生成

  ### 出力・結果
  - 64文字の16進数ハッシュ文字列
  - 同一入力に対して常に同じキーを返す（決定論的）
  - kwargs の順序に依存しない
