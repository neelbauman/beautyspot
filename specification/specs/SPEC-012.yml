text: |
  ## 概要
  同一関数・同一引数への同時リクエスト束ね（Thundering Herd Protection）。

  ## 詳細仕様

  ### 入力
  - 同一キャッシュキーへの複数同時リクエスト

  ### 処理
  - 最初のリクエストのみが関数を実行
  - 後続の同一キーリクエストは最初のリクエストの完了を待機
  - 完了後、全リクエストに同じ結果を返却
  - 失敗時は待機中のリクエストにも例外を伝播

  ### 出力・結果
  - 関数は同一引数に対して1回のみ実行される
  - 外部APIへの不要な重複リクエストを防止
