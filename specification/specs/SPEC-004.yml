text: |
  ## 概要
  MessagePackベースのシリアライザ（MsgpackSerializer）。

  ## 詳細仕様

  ### 入力
  - 任意のPythonオブジェクト（dumps）
  - バイト列（loads）

  ### 処理
  - MessagePack形式でのエンコード/デコード
  - カスタム型レジストリ（コード0〜127）による拡張型サポート
  - Copy-on-Write方式のレジストリ更新（スレッドセーフ）
  - スレッドローカルLRUキャッシュによるメモリリーク防止

  ### 出力・結果
  - SerializerProtocol に準拠（dumps -> bytes, loads -> object）
  - TypeRegistryProtocol に準拠（register メソッド）
  - No-GIL環境対応
