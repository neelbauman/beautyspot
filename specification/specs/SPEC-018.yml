text: |
  ## 概要
  メタデータDBのライフサイクル管理とタスク追跡。

  ## 詳細仕様

  ### 入力
  - DB接続情報
  - 保存、削除、取得の各種メタデータ（キー、ハッシュ、有効期限、サイズ等）

  ### 処理
  - 呼び出し側（Spot）による明示的な open() / close() 管理
  - アクティブな保存タスク（Future）の強参照による追跡
  - 保存リクエストの即時エンキューと、flush() 時の完了保証
  - db.close() 時の未完了タスクのキャンセルとクリーンアップ

  ### 出力・結果
  - データベース接続の確実なクローズ
  - 進行中のタスクが失われないこと、または適切に中断されることを保証
