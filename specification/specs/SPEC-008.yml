text: |
  ## 概要
  関数名パターンに基づくデータ保持ポリシー（LifecyclePolicy）。

  ## 詳細仕様

  ### 入力
  - Rule のリスト（globパターン + 保持期間）
  - 保持期間: "7d", "12h", "30m", timedelta, Retention.FOREVER 等

  ### 処理
  - 関数名をglobパターンでマッチし、対応する保持期間を返却
  - parse_retention() で文字列 → timedelta 変換
  - FOREVER: 明示的に無期限保持
  - 確率的自動削除（Probabilistic Auto-Eviction）:
    - Spot 初期化時の eviction_rate (0.0〜1.0) に基づき判定
    - 保存時に設定された確率（デフォルト 0.0、オプトイン）で gc をトリガー
    - 長時間稼働するプロセスにおいて、明示的なクリーンアップなしでキャッシュの肥大化を抑制

  ### 出力・結果
  - タスクごとの有効期限（datetime）を決定
  - gc/prune コマンドおよび自動エビクションが期限切れタスクを削除する際の判定基準
