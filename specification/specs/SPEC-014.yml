text: |
  ## 概要
  カスタム型のシリアライズ登録機構。

  ## 詳細仕様

  ### 入力
  - 対象クラス
  - code: 一意の整数（0〜127）
  - encoder: オブジェクト → dict 変換関数
  - decoder: dict → オブジェクト 復元関数

  ### 処理
  - @spot.register(code, encoder, decoder) デコレータで登録
  - spot.register_type(cls, code, encoder, decoder) メソッドで命令的に登録
  - MsgpackSerializer の型レジストリに追加
  - 登録順序に依存しないコード番号ベースの識別

  ### 出力・結果
  - カスタムクラスのインスタンスがキャッシュ可能になる
  - シリアライズ/デシリアライズが自動的に行われる
