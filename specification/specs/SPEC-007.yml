text: |
  ## 概要
  GCRA（Generic Cell Rate Algorithm）ベースのトークンバケットレートリミッター。

  ## 詳細仕様

  ### 入力
  - tokens_per_minute: 1分あたりの許可トークン数
  - cost: 1回の消費コスト

  ### 処理
  - consume(cost) / consume_async(cost) で消費を待機
  - スムーズなペーシング（アイドル後のバースト防止）
  - スレッドセーフかつasync対応

  ### 出力・結果
  - LimiterProtocol に準拠
  - 指定レートを超えないよう関数実行を遅延
