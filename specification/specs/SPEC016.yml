text: |
  `LifecyclePolicy` は `Rule` のリストに基づき、関数名パターン（fnmatch）で キャッシュの保持期間を決定する。`resolve_with_fallback()` は完全修飾名 → 短縮名の順でマッチングする。マッチしなければ無期限保持（None）を返す。
