text: |
  `spot.cached_run(*funcs, **kwargs)` コンテキストマネージャにより、 デコレータを直接付与できない外部ライブラリの関数に対して一時的にキャッシュ機能を適用する。 複数関数を同時に渡した場合はタプルで返す。関数が0個の場合は `ValidationError` を送出する。
