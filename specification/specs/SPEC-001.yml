text: |
  ## 概要
  @mark デコレータによる透過的キャッシュ機構。

  ## 詳細仕様

  ### 入力
  - 対象関数（同期/非同期）
  - オプション: version, save_blob, content_type, retention, save_sync, keygen, serializer, hooks
  - 非推奨オプション: input_key_fn（keygen に移行）

  ### 処理
  - デコレータ付与時に関数をラップし、呼び出し時にキャッシュキーを生成
  - キャッシュヒット時: DBからシリアライズ済みデータを復元して返却
  - キャッシュミス時: 関数を実行し、結果をシリアライズしてDB/Blobに保存
  - cached_run() コンテキストマネージャでも同等の機能を提供
  - ジェネレータ関数・非同期ジェネレータには ConfigurationError を送出

  ### 出力・結果
  - 元の関数と同じ戻り値（キャッシュ有無は呼び出し側に透過）
  - デコレートされた関数は functools.wraps により元のシグネチャを保持する
