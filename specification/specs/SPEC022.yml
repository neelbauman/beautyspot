text: |
  `bs.Spot(name, ...)` ファクトリ関数が唯一のパブリックエントリポイント。
  引数未指定時のデフォルト:
  - `SQLiteTaskDB (.beautyspot/{name}.db)`
  - `LocalStorage (.beautyspot/blobs/{name})`
  - `MsgpackSerializer`
  - `TokenBucket (10000 TPM)`
  - `WarningOnlyPolicy`

  全コンポーネントは `Protocol/ABC` で定義:
  `TaskDBCore`, `BlobStorageCore`, `SerializerProtocol`, `StoragePolicyProtocol`, `LimiterProtocol`。

  `core.Spot` は `CacheManager` と `LimiterProtocol` を直接受け取り、 ファクトリ外での直接インスタンス化は非推奨。
