text: |
  `inspect.iscoroutinefunction()` による自動判定で、同期関数には同期ラッパー (`_execute_sync`)、非同期関数には非同期ラッパー (`_execute_async`) を適用する。 非同期関数のキャッシュ保存は `_BackgroundLoop` 経由の asyncio イベントループで処理する。
