text: |
  ## 概要
  バックグラウンドI/Oによる非同期キャッシュ保存。

  ## 詳細仕様

  ### 入力
  - save_sync パラメータ（True: 同期保存 / False: 非同期保存）
  - Spot コンストラクタの save_sync: インスタンスレベルのデフォルト設定
  - @mark(save_sync=...) による関数ごとのオーバーライド

  ### 処理
  - save_sync=False: _BackgroundLoop（非同期イベントループ）にキャッシュ保存を委譲
  - _BackgroundLoop / executor は遅延初期化（save_sync=False の初回保存時に起動）
  - コンテキストマネージャ（with spot:）で flush() を呼び出しペンディングタスクの完了を待機
  - spot.flush(timeout=...) で明示的にドレイン可能
  - atexit ハンドラでプロセス終了時にリソースを解放（_BackgroundLoop._shutdown）
  - バックグラウンド保存の失敗はERRORログに記録、例外はraiseしない
  - on_background_error コールバックで失敗時の処理をカスタマイズ可能

  ### 出力・結果
  - メイン処理のレイテンシをゼロ（キャッシュ保存分）にできる
  - with ブロック終了時に全保存が完了することを保証
  - spot.shutdown() でバックグラウンドループを完全停止可能
