text: |
  ## 概要
  SQLiteベースのタスクメタデータストレージ（SQLiteTaskDB）。

  ## 詳細仕様

  ### 入力
  - DBファイルパス（省略時は .beautyspot/ 配下に自動生成）

  ### 処理
  - スキーマの自動作成・マイグレーション（ALTER TABLE による段階的カラム追加）
  - タスクレコードのCRUD操作（func_name, input_key, version, result等）
  - ライターキューによるスレッドセーフな書き込み（専用 Writer Thread が直列処理）
  - 読み取りはRLockで保護されたスレッドローカル接続経由
  - WALモードによる読み書きの並行性確保

  ### 出力・結果
  - TaskDBBase プロトコルに準拠
  - get_history(): pandas DataFrame によるタスク履歴取得
  - count_tasks(): 静的メソッドによるレコード件数の取得
  - get_keys_start_with(): プレフィックス検索
  - get_blob_refs(): Blob参照のセットを返却
  - flush(): 書き込みキューのドレイン保証
  - shutdown(): Writer Thread の安全な停止
  - delete_expired(): 有効期限切れレコードの物理削除
  - prune() / get_outdated_tasks(): 時間ベースの失効処理
