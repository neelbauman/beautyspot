text: |
  キャッシュの保存I/Oをバックグラウンドスレッドに委譲し、関数の応答レイテンシへの影響をゼロにするアーキテクチャを採用する。

  -   `ThreadPoolExecutor` と非同期イベントループ (`_BackgroundLoop`) を組み合わせる。

  -   コンテキストマネージャ (`with spot:`) の終了時に保留中の保存を完了するフラッシュ機構を提供し、データ喪失を防止する。

  -   バックグラウンド保存の失敗はログに記録し、関数の実行結果には影響を与えない。
