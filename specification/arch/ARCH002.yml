text: |
  SHA-256ハッシュベースのキャッシュキー生成アーキテクチャ。関数の引数をシリアライズ・正規化（dictのキーソート、型に応じた変換）し、関数名・バージョンと合わせてハッシュ化する。

  特定の引数をキーから除外する `KeyGenPolicy` パターンを採用し、ユーザーが引数ごとの戦略（無視、カスタム変換等）を宣言的に指定できるようにする。
