text: |
  関数名のパターンマッチング（glob形式）に基づくルールベースの有効期限ポリシーを採用する。

  `LifecyclePolicy` がルール群 (`Rule`) を保持し、キャッシュ保存時に関数名に最初にマッチするルールから有効期限 (`expires_at`) を計算する。期限切れのキャッシュはメンテナンス操作で一括削除される。
