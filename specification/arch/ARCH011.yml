  Typerフレームワーク上に構築し、`MaintenanceService` のファサードとして各管理操作をサブコマンドとして公開する。

  richライブラリでテーブル・パネル等のターミナル出力をフォーマットし、DBパスの自動検出 (`get_service`) でユーザーの操作負荷を軽減する。
