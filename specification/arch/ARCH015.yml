text: |
  システムを構成する主要コンポーネントとその責務、およびコンポーネント間の相互作用を定義する。

  ## 設計根拠

  各コンポーネントの責務境界を明確にし、機能追加や修正時における影響範囲の特定と、適切な責務の配置（凝集度の向上と結合度の低下）を促すため。
