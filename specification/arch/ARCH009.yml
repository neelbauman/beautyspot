text: |
  関数の実行ライフサイクル（実行前・キャッシュヒット・キャッシュミス）にカスタム処理を挿入するオブザーバーパターンを採用する。

  `HookBase` 基底クラスを継承してフックを実装し、`@spot.mark(hooks=[...])` で関数ごとに登録する。マルチスレッド環境向けにスレッドセーフな基底クラス (`ThreadSafeHookBase`) も提供する。
