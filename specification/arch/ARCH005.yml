text: |
  MessagePackベースのシリアライザをデフォルト採用する。JSONより高速・コンパクトで、バイナリデータを直接扱える。

  `SerializerProtocol` による差し替え可能な設計とし、`TypeRegistryProtocol` でユーザー定義型のカスタムエンコーダ・デコーダ登録を可能にする。シリアライザはキャッシュの保存・復元の両方で使用される。
