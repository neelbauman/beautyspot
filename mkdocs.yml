site_name: beautyspot
site_url: https://neelbauman.github.io/beautyspot/
repo_url: https://github.com/neelbauman/beautyspot
repo_name: neelbauman/beautyspot
edit_uri: edit/main/docs/

# テーマ設定: Material for MkDocs
theme:
  name: material
  palette:
    # ライトモード
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # ダークモード（beautyspotの"moon"コンセプトに合わせて）
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.expand
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

# 拡張機能設定
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        # Mermaid記法のサポート
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# プラグイン設定
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true

# ナビゲーション構造
nav:
  - Home: index.md
  - Getting Started: guides/usage_patterns.md
  - User Guides:
      - Caching Strategy: guides/caching.md
      - Data Serialization: guides/serialization.md
      - Custom Backends (DI): guides/custom_backend.md # 復活
      - Rate Limiting: guides/rate_limiting.md   # リネーム反映
      - CLI & Dashboard: guides/cli.md           # 新規追加
  - Cookbooks:
      - Overview: cookbooks/index.md
      - Custom Types: cookbooks/custom_types.md
      - Imperative Caching: cookbooks/imperative_caching.md
      - Advanced Key Generation: cookbooks/key_generation.md
      - Cloud Storage: cookbooks/cloud_storage.md
      - Task-specific Serializers: cookbooks/task_serializer.md
      - Web Scraping: cookbooks/web_scraping.md
      - ML Pipelines: cookbooks/ml_pipelines.md
      - Web Applications (FastAPI): cookbooks/web_apps.md
      - LLM Ecosystem: cookbooks/llm_apps.md
      - Testing: cookbooks/testing.md
  - Reference:
      - Spot: reference/core.md
      - CacheKey: reference/cachekey.md
      - CacheDB: reference/db.md
      - Storage: reference/storage.md
      - Types: reference/types.md
      - MaintenanceService: reference/maintenance.md
  - Topics:
      - Philosophy: reference/philosophy.md
      - Architecture: reference/architecture.md
